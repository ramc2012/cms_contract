server {
  listen 80;
  server_name _;

  client_max_body_size 30m;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options            "SAMEORIGIN"                        always;
  add_header X-Content-Type-Options     "nosniff"                           always;
  add_header X-XSS-Protection           "1; mode=block"                     always;
  add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
  add_header Permissions-Policy         "geolocation=(), camera=(), microphone=(), payment=()" always;
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    always;

  # ── Gzip compression ─────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_min_length   256;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # ── API reverse proxy ─────────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
    proxy_set_header   X-Request-ID       $http_x_request_id;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    30s;
  }

  # ── File uploads proxy (local STORAGE_MODE=local) ─────────────────────────
  location /uploads/ {
    proxy_pass         http://api:4000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_cache_valid  200 1d;
    expires            1d;
    add_header         Cache-Control "public";
  }

  # ── Static asset caching ──────────────────────────────────────────────────
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires   30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    try_files $uri /index.html;
  }
}

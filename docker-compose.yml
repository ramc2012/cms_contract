services:
  db:
    image: postgres:16-alpine
    container_name: fms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fms_track}
      POSTGRES_USER: ${POSTGRES_USER:-fms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fms_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fms} -d ${POSTGRES_DB:-fms_track}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: fms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      /usr/bin/mc mb -p local/${S3_BUCKET:-fms-track-docs} || true;
      /usr/bin/mc anonymous set download local/${S3_BUCKET:-fms-track-docs} || true;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fms-api
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set — run: openssl rand -hex 64}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fms}:${POSTGRES_PASSWORD:-fms_secret}@db:5432/${POSTGRES_DB:-fms_track}?schema=public
      AUTO_SEED: ${AUTO_SEED:-true}
      SEED_XLSX_PATH: /app/seed-data/all-instruments-isg-2025.xlsx
      STORAGE_MODE: ${STORAGE_MODE:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-fms-track-docs}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4000}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: fms-web
    ports:
      - "${APP_PORT:-4000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
